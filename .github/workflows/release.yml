name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: tabularis-informix-plugin

jobs:
  build:
    name: ${{ matrix.platform-label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform-label: win-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - platform-label: win-x86
            runner: windows-latest
            target: i686-pc-windows-msvc
          - platform-label: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install unixODBC (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y unixodbc-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "staging"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\$env:BIN_NAME.exe" $stage
          Copy-Item "manifest.json" $stage
          $zip = "$env:BIN_NAME-${{ matrix.platform-label }}-${{ github.ref_name }}.zip"
          Compress-Archive -Path "$stage\*" -DestinationPath $zip
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          stage=staging
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "$stage/"
          cp manifest.json "$stage/"
          zip="$BIN_NAME-${{ matrix.platform-label }}-${{ github.ref_name }}.zip"
          (cd "$stage" && zip -r "../$zip" .)
          echo "ASSET=$zip" >> "$GITHUB_ENV"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
