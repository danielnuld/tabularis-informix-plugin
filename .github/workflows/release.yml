name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: tabularis-informix-plugin

jobs:
  build:
    name: ${{ matrix.platform-label }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform-label: win-x64
            target: x86_64-pc-windows-msvc
          - platform-label: win-x86
            target: i686-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: pwsh
        run: |
          $stage = "staging"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\$env:BIN_NAME.exe" $stage
          Copy-Item "manifest.json" $stage
          $zip = "$env:BIN_NAME-${{ matrix.platform-label }}-${{ github.ref_name }}.zip"
          Compress-Archive -Path "$stage\*" -DestinationPath $zip
          "ASSET=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
